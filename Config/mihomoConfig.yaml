# --- 策略组 (Proxy Groups) ---

# 策略组通用配置
group_common_select:
  &group_common_select {
    type: select,
    interval: 600,
    timeout: 3000,
    max-failed-times: 3,
    url: 'https://g.cn/generate_204',
    lazy: true,
  }

group_common_auto:
  &group_common_auto {
    type: url-test,
    interval: 600,
    timeout: 3000,
    max-failed-times: 3,
    url: 'https://g.cn/generate_204',
    lazy: true,
    tolerance: 100,
    include-all: true,
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Auto.png',
    hidden: true,
  }

# 通用代理节点组
prox_common:
  &proxies {
    proxies:
      [
        '默认代理',
        '香港',
        '日本',
        '美国',
        '新加坡',
        '台湾省',
        '低倍率节点',
        '高倍率节点',
        '其他节点',
      ],
  }

